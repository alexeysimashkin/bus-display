<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бегущая строка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* Бегущая строка */
        .ticker-container {
            width: 100%;
            overflow: hidden;
            background: #000;
            padding: 15px 0;
            border-top: 2px solid #ffd700;
            border-bottom: 2px solid #ffd700;
            position: relative;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            padding-left: 100%;
            animation: ticker 6s linear infinite;
        }

        @keyframes ticker {
            0% { 
                transform: translateX(0); 
            }
            100% { 
                transform: translateX(-100%); 
            }
        }

        /* Стили для разных фаз */
        .ticker-text.announcement {
            color: #4fc3f7;
            animation: ticker 5s linear infinite;
        }

        .ticker-text.stopped {
            animation: none;
            color: #888;
            text-align: center;
            width: 100%;
            padding-left: 0;
            display: block;
        }

        .ticker-text.final {
            animation: none;
            color: #fff;
            text-align: center;
            width: 100%;
            padding-left: 0;
            display: block;
        }

        /* Селектор маршрута */
        .selection-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
        }

        .selection-overlay select {
            padding: 8px 12px;
            background: #1a1a2e;
            color: #fff;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .selection-overlay select:focus {
            border-color: #ffd700;
        }

        .selection-overlay button {
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }

        .selection-overlay button:hover {
            background: #45a049;
        }

        .selection-overlay button.stop-btn {
            background: #f44336;
        }

        .selection-overlay button.stop-btn:hover {
            background: #d32f2f;
        }
    </style>
</head>
<body>
    <!-- Бегущая строка -->
    <div class="ticker-container">
        <span class="ticker-text stopped" id="tickerText">
            Выберите маршрут
        </span>
    </div>

    <!-- Селектор маршрута -->
    <div class="selection-overlay" id="selectionOverlay">
        <select id="tickerCitySelect" onchange="onTickerCityChange()">
            <option value="">Город...</option>
        </select>
        <select id="tickerRouteSelect" disabled onchange="onTickerRouteChange()">
            <option value="">Маршрут...</option>
        </select>
        <button id="tickerApplyBtn" disabled onclick="applyTickerRoute()">▶ Старт</button>
        <button class="stop-btn" onclick="stopTicker()">⏹ Стоп</button>
    </div>

    <script>
        // ============ ПЕРЕМЕННЫЕ ============
        let selectedRouteId = null;
        let selectedRouteData = null;
        let stopsData = [];
        let currentStopOrder = 1;
        let totalStops = 0;
        let pollInterval = null;
        let previousStopOrder = null;
        let tickerPhase = 'route';
        let announcementTimeout = null;

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        document.addEventListener('DOMContentLoaded', () => {
            loadCitiesForTicker();
        });

        // ============ ЗАГРУЗКА ГОРОДОВ ============
        async function loadCitiesForTicker() {
            try {
                const response = await fetch('/api/cities');
                const cities = await response.json();
                const select = document.getElementById('tickerCitySelect');
                select.innerHTML = '<option value="">Город...</option>';
                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city.id;
                    option.textContent = city.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Ошибка загрузки городов:', error);
            }
        }

        // ============ ВЫБОР ГОРОДА ============
        async function onTickerCityChange() {
            const cityId = document.getElementById('tickerCitySelect').value;
            const routeSelect = document.getElementById('tickerRouteSelect');
            const applyBtn = document.getElementById('tickerApplyBtn');

            if (!cityId) {
                routeSelect.innerHTML = '<option value="">Маршрут...</option>';
                routeSelect.disabled = true;
                applyBtn.disabled = true;
                return;
            }

            try {
                const response = await fetch(`/api/routes?city_id=${cityId}`);
                const routes = await response.json();
                routeSelect.innerHTML = '<option value="">Маршрут...</option>';
                routes.forEach(route => {
                    const option = document.createElement('option');
                    option.value = route.id;
                    option.textContent = `№${route.route_number} - ${route.name}`;
                    option.dataset.routeNumber = route.route_number;
                    option.dataset.routeName = route.name;
                    routeSelect.appendChild(option);
                });
                routeSelect.disabled = false;
                applyBtn.disabled = true;
            } catch (error) {
                console.error('Ошибка загрузки маршрутов:', error);
            }
        }

        // ============ ВЫБОР МАРШРУТА ============
        function onTickerRouteChange() {
            const applyBtn = document.getElementById('tickerApplyBtn');
            applyBtn.disabled = !document.getElementById('tickerRouteSelect').value;
        }

        // ============ ЗАПУСК БЕГУЩЕЙ СТРОКИ ============
        async function applyTickerRoute() {
            const routeSelect = document.getElementById('tickerRouteSelect');
            selectedRouteId = routeSelect.value;
            if (!selectedRouteId) return;

            const selectedOption = routeSelect.options[routeSelect.selectedIndex];
            selectedRouteData = {
                id: selectedRouteId,
                route_number: selectedOption.dataset.routeNumber,
                name: selectedOption.dataset.routeName
            };

            try {
                const response = await fetch(`/api/stops?route_id=${selectedRouteId}`);
                stopsData = await response.json();
                totalStops = stopsData.length;

                if (totalStops === 0) {
                    const tickerEl = document.getElementById('tickerText');
                    tickerEl.textContent = 'Нет остановок';
                    tickerEl.className = 'ticker-text stopped';
                    tickerEl.style.animation = 'none';
                    return;
                }

                const stateResponse = await fetch(`/api/current-stop?route_id=${selectedRouteId}`);
                const stateData = await stateResponse.json();
                currentStopOrder = stateData.current_order || 1;
                previousStopOrder = currentStopOrder;

                tickerPhase = 'route';
                showCurrentStop();
                startPolling();

            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        // ============ СБРОС АНИМАЦИИ ============
        function resetAnimation(el) {
            el.style.animation = 'none';
            el.offsetHeight; // форсируем reflow
            el.style.animation = '';
        }

        // ============ ПОКАЗАТЬ ТЕКУЩУЮ ОСТАНОВКУ ============
        function showCurrentStop() {
            const tickerEl = document.getElementById('tickerText');
            const currentStop = stopsData[currentStopOrder - 1];

            if (!currentStop) return;

            if (currentStopOrder >= totalStops) {
                // Конечная — без анимации, по центру
                tickerEl.textContent = `🏁 Конечная остановка «${currentStop.name}» | Спасибо за поездку!`;
                tickerEl.className = 'ticker-text final';
                tickerEl.style.animation = 'none';
                tickerEl.style.paddingLeft = '0';
                tickerEl.style.display = 'block';
                return;
            }

            // Обычная остановка — бегущая строка
            tickerEl.textContent = `📍 Остановка «${currentStop.name}»`;
            tickerEl.className = 'ticker-text';
            tickerEl.style.display = 'inline-block';
            tickerEl.style.paddingLeft = '100%';
            resetAnimation(tickerEl);
            tickerEl.style.animation = 'ticker 6s linear infinite';
        }

        // ============ ПОКАЗАТЬ ОБЪЯВЛЕНИЕ "СЛЕДУЮЩАЯ ОСТАНОВКА" ============
        function showAnnouncement() {
            const tickerEl = document.getElementById('tickerText');
            const nextStop = stopsData[currentStopOrder];

            if (!nextStop) {
                showCurrentStop();
                return;
            }

            tickerEl.textContent = `🔊 Следующая остановка — ${nextStop.name}`;
            tickerEl.className = 'ticker-text announcement';
            tickerEl.style.display = 'inline-block';
            tickerEl.style.paddingLeft = '100%';
            resetAnimation(tickerEl);
            tickerEl.style.animation = 'ticker 5s linear infinite';

            // Через 4 секунды показываем текущую остановку
            if (announcementTimeout) clearTimeout(announcementTimeout);
            announcementTimeout = setTimeout(() => {
                if (tickerPhase === 'announcement') {
                    tickerPhase = 'route';
                    showCurrentStop();
                }
            }, 4000);
        }

        // ============ ОПРОС СЕРВЕРА ============
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);

            pollInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/current-stop?route_id=${selectedRouteId}`);
                    const data = await response.json();
                    const newOrder = data.current_order || 1;

                    if (newOrder !== previousStopOrder) {
                        previousStopOrder = newOrder;
                        currentStopOrder = newOrder;

                        if (currentStopOrder >= totalStops) {
                            tickerPhase = 'route';
                            showCurrentStop();
                        } else {
                            tickerPhase = 'announcement';
                            showAnnouncement();
                        }
                    }
                } catch (error) {
                    console.error('Ошибка опроса:', error);
                }
            }, 2000);
        }

        // ============ ОСТАНОВКА ============
        function stopTicker() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = null;
            if (announcementTimeout) clearTimeout(announcementTimeout);

            const tickerEl = document.getElementById('tickerText');
            tickerEl.style.animation = 'none';
            tickerEl.textContent = '⏸ Остановлено';
            tickerEl.className = 'ticker-text stopped';
            tickerEl.style.display = 'block';
            tickerEl.style.paddingLeft = '0';

            selectedRouteId = null;
            previousStopOrder = null;
        }
    </script>
</body>
</html>
