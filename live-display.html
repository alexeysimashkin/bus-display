<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табло автобуса - Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e8e8e8;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============ ЭКРАН ВЫБОРА МАРШРУТА ============ */
        .selection-screen {
            background: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
        }

        .selection-screen.hidden {
            display: none;
        }

        .selection-title {
            color: #1a237e;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .selection-panel {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ddd;
            min-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 16px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .form-group select {
            width: 100%;
            padding: 15px;
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            outline: none;
        }

        .form-group select:focus {
            border-color: #1a237e;
        }

        .form-group select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            width: 100%;
            padding: 18px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .btn-start:hover:not(:disabled) {
            background: #283593;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(26, 35, 126, 0.3);
        }

        .btn-start:disabled {
            background: #bbb;
            cursor: not-allowed;
        }

        /* ============ ЭКРАН ТАБЛО ============ */
        .display-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .display-screen.hidden {
            display: none;
        }

        /* Верхняя панель */
        .top-panel {
            background: #fff;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e0e0e0;
            height: 60px;
        }

        .route-badge {
            background: #1a237e;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .route-number-badge {
            font-size: 28px;
            font-weight: bold;
        }

        .weather-widget {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #0288d1;
            font-size: 18px;
        }

        .weather-icon {
            font-size: 28px;
        }

        .datetime-widget {
            color: #333;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
        }

        .time-display {
            font-size: 24px;
            font-weight: bold;
            color: #1a237e;
            font-family: 'Courier New', monospace;
        }

        /* Центральная область */
        .center-area {
            flex: 1;
            display: flex;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .side-info {
            width: 200px;
            background: #1a237e;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .side-info .big-number {
            font-size: 80px;
            font-weight: bold;
            line-height: 1;
        }

        .side-info .route-label {
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            opacity: 0.8;
            letter-spacing: 3px;
        }

        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .next-stop-header {
            color: #1a237e;
            font-size: 18px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            animation: blink 2s infinite;
            font-weight: bold;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .next-stop-name {
            color: #1a237e;
            font-size: 56px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .current-stop-info {
            color: #666;
            font-size: 20px;
        }

        .current-stop-name {
            color: #0288d1;
            font-weight: bold;
        }

        .final-stop-side {
            width: 250px;
            background: #f5f5f5;
            border-left: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .final-label-text {
            color: #999;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .final-stop-name {
            color: #d32f2f;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
        }

        /* Индикатор остановок */
        .stop-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .stop-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
            transition: all 0.5s;
        }

        .stop-dot.passed {
            background: #4CAF50;
        }

        .stop-dot.current {
            background: #1a237e;
            box-shadow: 0 0 10px rgba(26, 35, 126, 0.5);
            animation: pulse-dot 1s infinite;
        }

        .stop-dot.upcoming {
            background: #ccc;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        /* Нижняя панель */
        .bottom-bar {
            background: #fafafa;
            border-top: 2px solid #e0e0e0;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        .route-full-name {
            color: #333;
            font-size: 16px;
            font-weight: bold;
        }

        .stop-counter {
            color: #888;
            font-size: 14px;
        }

        /* Кнопка возврата */
        .back-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.1);
            color: #333;
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ВЫБОРА МАРШРУТА -->
    <div class="selection-screen" id="selectionScreen">
        <div class="selection-title">🚌 Выберите маршрут</div>
        <div class="selection-panel">
            <div class="form-group">
                <label>🏙️ Город</label>
                <select id="citySelect" onchange="onCityChange()">
                    <option value="">Выберите город...</option>
                </select>
            </div>
            <div class="form-group">
                <label>🚌 Маршрут</label>
                <select id="routeSelect" disabled onchange="onRouteChange()">
                    <option value="">Сначала выберите город...</option>
                </select>
            </div>
            <button class="btn-start" id="startBtn" disabled onclick="startDisplay()">
                ▶️ ЗАПУСТИТЬ ТАБЛО
            </button>
        </div>
    </div>

    <!-- ЭКРАН ТАБЛО -->
    <div class="display-screen hidden" id="displayScreen">
        <button class="back-btn" onclick="goBack()" title="Вернуться к выбору">✕</button>
        
        <!-- Верхняя панель -->
        <div class="top-panel">
            <div class="route-badge">
                <span class="route-number-badge" id="dispRouteNumber">42</span>
                <span id="dispRouteName">Центр - Вокзал</span>
            </div>
            <div class="weather-widget">
                <span class="weather-icon" id="weatherIcon">☀️</span>
                <span id="weatherTemp">22°C</span>
            </div>
            <div class="datetime-widget">
                <span id="currentDate">28 июня 2026</span>
                <span class="time-display" id="currentTime">14:30:45</span>
            </div>
        </div>

        <!-- Центральная область -->
        <div class="center-area">
            <div class="side-info">
                <div class="big-number" id="dispBigNumber">42</div>
                <div class="route-label">МАРШРУТ</div>
            </div>

            <div class="main-display">
                <div class="next-stop-header">СЛЕДУЮЩАЯ ОСТАНОВКА</div>
                <div class="next-stop-name" id="nextStopDisplay">---</div>
                <div class="current-stop-info">
                    Текущая: <span class="current-stop-name" id="currentStopDisplay">---</span>
                </div>
                
                <div class="stop-indicator" id="stopIndicator"></div>
            </div>

            <div class="final-stop-side">
                <div class="final-label-text">КОНЕЧНАЯ</div>
                <div class="final-stop-name" id="finalStopDisplay">---</div>
            </div>
        </div>

        <!-- Нижняя панель -->
        <div class="bottom-bar">
            <div class="route-full-name" id="routeFullName">Маршрут №42: Центр → Вокзал</div>
            <div class="stop-counter" id="stopCounter">Остановка 1 из 7</div>
        </div>
    </div>

    <script>
        let selectedRouteId = null;
        let selectedRouteData = null;
        let stopsData = [];
        let currentStopOrder = 1;
        let totalStops = 0;
        let autoAdvanceInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadCities();
            startClock();
        });

        function startClock() {
            updateClock();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
            const timeStr = now.toLocaleTimeString('ru-RU');
            const dateEl = document.getElementById('currentDate');
            const timeEl = document.getElementById('currentTime');
            if (dateEl) dateEl.textContent = dateStr;
            if (timeEl) timeEl.textContent = timeStr;
        }

        const weatherOptions = [
            { icon: '☀️', temp: '28°C' },
            { icon: '⛅', temp: '24°C' },
            { icon: '☁️', temp: '20°C' },
            { icon: '🌧️', temp: '18°C' },
            { icon: '🌨️', temp: '-2°C' },
            { icon: '❄️', temp: '-8°C' }
        ];

        function randomWeather() {
            const w = weatherOptions[Math.floor(Math.random() * weatherOptions.length)];
            document.getElementById('weatherIcon').textContent = w.icon;
            document.getElementById('weatherTemp').textContent = w.temp;
        }

        setInterval(randomWeather, 60000);
        randomWeather();

        async function loadCities() {
            try {
                const response = await fetch('/api/cities');
                const cities = await response.json();
                const select = document.getElementById('citySelect');
                select.innerHTML = '<option value="">Выберите город...</option>';
                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city.id;
                    option.textContent = city.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Ошибка загрузки городов:', error);
            }
        }

        async function onCityChange() {
            const cityId = document.getElementById('citySelect').value;
            const routeSelect = document.getElementById('routeSelect');
            const startBtn = document.getElementById('startBtn');
            
            if (!cityId) {
                routeSelect.innerHTML = '<option value="">Сначала выберите город...</option>';
                routeSelect.disabled = true;
                startBtn.disabled = true;
                return;
            }
            
            try {
                const response = await fetch(`/api/routes?city_id=${cityId}`);
                const routes = await response.json();
                routeSelect.innerHTML = '<option value="">Выберите маршрут...</option>';
                routes.forEach(route => {
                    const option = document.createElement('option');
                    option.value = route.id;
                    option.textContent = `№${route.route_number} - ${route.name}`;
                    option.dataset.routeNumber = route.route_number;
                    option.dataset.routeName = route.name;
                    option.dataset.endPoint = route.end_point;
                    option.dataset.startPoint = route.start_point;
                    option.dataset.cityName = route.city_name;
                    routeSelect.appendChild(option);
                });
                routeSelect.disabled = false;
                startBtn.disabled = true;
            } catch (error) {
                console.error('Ошибка загрузки маршрутов:', error);
            }
        }

        function onRouteChange() {
            const routeSelect = document.getElementById('routeSelect');
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = !routeSelect.value;
        }

        async function startDisplay() {
            const routeSelect = document.getElementById('routeSelect');
            selectedRouteId = routeSelect.value;
            if (!selectedRouteId) return;
            
            const selectedOption = routeSelect.options[routeSelect.selectedIndex];
            selectedRouteData = {
                id: selectedRouteId,
                route_number: selectedOption.dataset.routeNumber,
                name: selectedOption.dataset.routeName,
                end_point: selectedOption.dataset.endPoint,
                start_point: selectedOption.dataset.startPoint,
                city_name: selectedOption.dataset.cityName
            };
            
            try {
                const response = await fetch(`/api/stops?route_id=${selectedRouteId}`);
                stopsData = await response.json();
                totalStops = stopsData.length;
                
                if (totalStops === 0) {
                    alert('У этого маршрута нет остановок. Добавьте остановки в админ-панели.');
                    return;
                }
                
                const stateResponse = await fetch(`/api/current-stop?route_id=${selectedRouteId}`);
                const stateData = await stateResponse.json();
                currentStopOrder = stateData.current_order || 1;
                
                document.getElementById('selectionScreen').classList.add('hidden');
                document.getElementById('displayScreen').classList.remove('hidden');
                
                updateDisplayInfo();
                createStopIndicator();
                startAutoAdvance();
                updateServerState();
                
            } catch (error) {
                console.error('Ошибка запуска табло:', error);
                alert('Ошибка загрузки данных маршрута');
            }
        }

        function updateDisplayInfo() {
            document.getElementById('dispRouteNumber').textContent = selectedRouteData.route_number;
            document.getElementById('dispRouteName').textContent = selectedRouteData.name;
            document.getElementById('dispBigNumber').textContent = selectedRouteData.route_number;
            document.getElementById('finalStopDisplay').textContent = selectedRouteData.end_point;
            document.getElementById('routeFullName').textContent = 
                `Маршрут №${selectedRouteData.route_number}: ${selectedRouteData.start_point} → ${selectedRouteData.end_point}`;
            updateStopDisplay();
        }

        function updateStopDisplay() {
            const currentStop = stopsData[currentStopOrder - 1];
            const nextStop = stopsData[currentStopOrder];
            
            document.getElementById('currentStopDisplay').textContent = currentStop ? currentStop.name : '---';
            document.getElementById('stopCounter').textContent = `Остановка ${currentStopOrder} из ${totalStops}`;
            
            if (nextStop) {
                document.getElementById('nextStopDisplay').textContent = nextStop.name;
            } else if (currentStopOrder >= totalStops) {
                document.getElementById('nextStopDisplay').textContent = 'КОНЕЧНАЯ';
            }
            
            updateStopIndicator();
        }

        function createStopIndicator() {
            const container = document.getElementById('stopIndicator');
            container.innerHTML = '';
            stopsData.forEach((stop, index) => {
                const dot = document.createElement('div');
                dot.className = 'stop-dot';
                dot.title = stop.name;
                dot.dataset.index = index + 1;
                container.appendChild(dot);
            });
            updateStopIndicator();
        }

        function updateStopIndicator() {
            const dots = document.querySelectorAll('.stop-dot');
            dots.forEach(dot => {
                const index = parseInt(dot.dataset.index);
                dot.className = 'stop-dot';
                if (index < currentStopOrder) dot.classList.add('passed');
                else if (index === currentStopOrder) dot.classList.add('current');
                else dot.classList.add('upcoming');
            });
        }

        function startAutoAdvance() {
            if (autoAdvanceInterval) clearInterval(autoAdvanceInterval);
            autoAdvanceInterval = setInterval(() => {
                moveToNextStop();
            }, 8000);
        }

        async function moveToNextStop() {
            if (currentStopOrder >= totalStops) {
                clearInterval(autoAdvanceInterval);
                autoAdvanceInterval = null;
                return;
            }
            currentStopOrder++;
            updateStopDisplay();
            updateServerState();
        }

        async function updateServerState() {
            try {
                await fetch('/api/current-stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        route_id: parseInt(selectedRouteId),
                        direction: 'next',
                        force_order: currentStopOrder
                    })
                });
            } catch (error) {
                console.error('Ошибка обновления состояния:', error);
            }
        }

        function goBack() {
            if (autoAdvanceInterval) clearInterval(autoAdvanceInterval);
            selectedRouteId = null;
            selectedRouteData = null;
            stopsData = [];
            currentStopOrder = 1;
            totalStops = 0;
            document.getElementById('displayScreen').classList.add('hidden');
            document.getElementById('selectionScreen').classList.remove('hidden');
            document.getElementById('routeSelect').value = '';
            document.getElementById('startBtn').disabled = true;
        }

        document.addEventListener('keydown', (e) => {
            const displayVisible = !document.getElementById('displayScreen').classList.contains('hidden');
            if (!displayVisible) return;
            switch(e.key) {
                case 'ArrowRight':
                case ' ':
                    e.preventDefault();
                    moveToNextStop();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (currentStopOrder > 1) {
                        currentStopOrder--;
                        updateStopDisplay();
                        updateServerState();
                    }
                    break;
                case 'Escape':
                    goBack();
                    break;
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });
        document.addEventListener('touchend', (e) => {
            const displayVisible = !document.getElementById('displayScreen').classList.contains('hidden');
            if (!displayVisible) return;
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    moveToNextStop();
                } else {
                    if (currentStopOrder > 1) {
                        currentStopOrder--;
                        updateStopDisplay();
                        updateServerState();
                    }
                }
            }
        });
    </script>
</body>
</html>
