<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Табло автобуса - Live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ============ ЭКРАН ВЫБОРА МАРШРУТА ============ */
        .selection-screen {
            background: #0a0a1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
        }

        .selection-screen.hidden {
            display: none;
        }

        .selection-title {
            color: #ffd700;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .selection-panel {
            background: rgba(20, 20, 40, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #333;
            min-width: 500px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #888;
            font-size: 16px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .form-group select {
            width: 100%;
            padding: 15px;
            background: #1a1a2e;
            color: #fff;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            outline: none;
        }

        .form-group select:focus {
            border-color: #ffd700;
        }

        .form-group select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        .btn-start:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }

        .btn-start:disabled {
            background: #333;
            cursor: not-allowed;
        }

        /* ============ ЭКРАН ТАБЛО ============ */
        .display-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .display-screen.hidden {
            display: none;
        }

        /* Верхняя панель */
        .top-panel {
            background: #0a0a0a;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            height: 60px;
        }

        .route-badge {
            background: #ffd700;
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .route-number-badge {
            font-size: 28px;
            font-weight: bold;
        }

        .weather-widget {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #4fc3f7;
            font-size: 18px;
        }

        .weather-icon {
            font-size: 28px;
        }

        .datetime-widget {
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
        }

        .time-display {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            font-family: 'Courier New', monospace;
        }

        /* Центральная область */
        .center-area {
            flex: 1;
            display: flex;
            background: #0a0a12;
            position: relative;
            overflow: hidden;
        }

        .side-info {
            width: 200px;
            background: #ffd700;
            color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .side-info .big-number {
            font-size: 80px;
            font-weight: bold;
            line-height: 1;
        }

        .side-info .route-label {
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            opacity: 0.8;
        }

        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .next-stop-header {
            color: #ffd700;
            font-size: 18px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .next-stop-name {
            color: #fff;
            font-size: 56px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            line-height: 1.2;
        }

        .current-stop-info {
            color: #888;
            font-size: 20px;
        }

        .current-stop-name {
            color: #4fc3f7;
            font-weight: bold;
        }

        .final-stop-side {
            width: 250px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .final-label-text {
            color: #666;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .final-stop-name {
            color: #4fc3f7;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 1.3;
        }

        /* Бегущая строка внизу */
        .ticker-bar {
            background: #111;
            border-top: 2px solid #ffd700;
            padding: 12px 0;
            overflow: hidden;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .ticker-content {
            animation: ticker-scroll 20s linear infinite;
            white-space: nowrap;
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            padding-left: 100%;
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .ticker-content.announcement {
            animation: ticker-scroll 15s linear infinite;
            color: #4fc3f7;
        }

        /* Индикатор остановок */
        .stop-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .stop-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
            transition: all 0.5s;
        }

        .stop-dot.passed {
            background: #4CAF50;
        }

        .stop-dot.current {
            background: #ffd700;
            box-shadow: 0 0 10px #ffd700;
            animation: pulse-dot 1s infinite;
        }

        .stop-dot.upcoming {
            background: #666;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        /* Кнопка возврата */
        .back-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ВЫБОРА МАРШРУТА -->
    <div class="selection-screen" id="selectionScreen">
        <div class="selection-title">🚌 Выберите маршрут</div>
        <div class="selection-panel">
            <div class="form-group">
                <label>🏙️ Город</label>
                <select id="citySelect" onchange="onCityChange()">
                    <option value="">Выберите город...</option>
                </select>
            </div>
            <div class="form-group">
                <label>🚌 Маршрут</label>
                <select id="routeSelect" disabled onchange="onRouteChange()">
                    <option value="">Сначала выберите город...</option>
                </select>
            </div>
            <button class="btn-start" id="startBtn" disabled onclick="startDisplay()">
                ▶️ ЗАПУСТИТЬ ТАБЛО
            </button>
        </div>
    </div>

    <!-- ЭКРАН ТАБЛО -->
    <div class="display-screen hidden" id="displayScreen">
        <button class="back-btn" onclick="goBack()" title="Вернуться к выбору">✕</button>
        
        <!-- Верхняя панель -->
        <div class="top-panel">
            <div class="route-badge">
                <span class="route-number-badge" id="dispRouteNumber">42</span>
                <span id="dispRouteName">Центр - Вокзал</span>
            </div>
            <div class="weather-widget">
                <span class="weather-icon" id="weatherIcon">☀️</span>
                <span id="weatherTemp">22°C</span>
            </div>
            <div class="datetime-widget">
                <span id="currentDate">28 июня 2026</span>
                <span class="time-display" id="currentTime">14:30:45</span>
            </div>
        </div>

        <!-- Центральная область -->
        <div class="center-area">
            <div class="side-info">
                <div class="big-number" id="dispBigNumber">42</div>
                <div class="route-label">МАРШРУТ</div>
            </div>

            <div class="main-display">
                <div class="next-stop-header">СЛЕДУЮЩАЯ ОСТАНОВКА</div>
                <div class="next-stop-name" id="nextStopDisplay">---</div>
                <div class="current-stop-info">
                    Текущая: <span class="current-stop-name" id="currentStopDisplay">---</span>
                </div>
                
                <!-- Индикатор остановок -->
                <div class="stop-indicator" id="stopIndicator"></div>
            </div>

            <div class="final-stop-side">
                <div class="final-label-text">КОНЕЧНАЯ</div>
                <div class="final-stop-name" id="finalStopDisplay">---</div>
            </div>
        </div>

        <!-- Бегущая строка -->
        <div class="ticker-bar">
            <div class="ticker-content" id="tickerText">
                Добро пожаловать! Выберите маршрут для начала движения.
            </div>
        </div>
    </div>

    <script>
        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        let selectedRouteId = null;
        let selectedRouteData = null;
        let stopsData = [];
        let currentStopOrder = 1;
        let totalStops = 0;
        let autoAdvanceInterval = null;
        let tickerInterval = null;
        let tickerPhase = 'route'; // 'route' или 'announcement'
        let isAnnouncing = false;

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        document.addEventListener('DOMContentLoaded', () => {
            loadCities();
            startClock();
        });

        // ============ ЧАСЫ ============
        function startClock() {
            updateClock();
            setInterval(updateClock, 1000);
        }

        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('ru-RU', { 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric' 
            });
            const timeStr = now.toLocaleTimeString('ru-RU');
            
            const dateEl = document.getElementById('currentDate');
            const timeEl = document.getElementById('currentTime');
            if (dateEl) dateEl.textContent = dateStr;
            if (timeEl) timeEl.textContent = timeStr;
        }

        // ============ ПОГОДА ============
        const weatherOptions = [
            { icon: '☀️', temp: '28°C' },
            { icon: '⛅', temp: '24°C' },
            { icon: '☁️', temp: '20°C' },
            { icon: '🌧️', temp: '18°C' },
            { icon: '🌨️', temp: '-2°C' },
            { icon: '❄️', temp: '-8°C' }
        ];

        function randomWeather() {
            const w = weatherOptions[Math.floor(Math.random() * weatherOptions.length)];
            document.getElementById('weatherIcon').textContent = w.icon;
            document.getElementById('weatherTemp').textContent = w.temp;
        }

        setInterval(randomWeather, 60000);
        randomWeather();

        // ============ ЗАГРУЗКА ГОРОДОВ ============
        async function loadCities() {
            try {
                const response = await fetch('/api/cities');
                const cities = await response.json();
                
                const select = document.getElementById('citySelect');
                select.innerHTML = '<option value="">Выберите город...</option>';
                
                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city.id;
                    option.textContent = city.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Ошибка загрузки городов:', error);
            }
        }

        // ============ ОБРАБОТЧИК ВЫБОРА ГОРОДА ============
        async function onCityChange() {
            const cityId = document.getElementById('citySelect').value;
            const routeSelect = document.getElementById('routeSelect');
            const startBtn = document.getElementById('startBtn');
            
            if (!cityId) {
                routeSelect.innerHTML = '<option value="">Сначала выберите город...</option>';
                routeSelect.disabled = true;
                startBtn.disabled = true;
                return;
            }
            
            try {
                const response = await fetch(`/api/routes?city_id=${cityId}`);
                const routes = await response.json();
                
                routeSelect.innerHTML = '<option value="">Выберите маршрут...</option>';
                routes.forEach(route => {
                    const option = document.createElement('option');
                    option.value = route.id;
                    option.textContent = `№${route.route_number} - ${route.name}`;
                    option.dataset.routeNumber = route.route_number;
                    option.dataset.routeName = route.name;
                    option.dataset.endPoint = route.end_point;
                    routeSelect.appendChild(option);
                });
                
                routeSelect.disabled = false;
                startBtn.disabled = true;
            } catch (error) {
                console.error('Ошибка загрузки маршрутов:', error);
            }
        }

        // ============ ОБРАБОТЧИК ВЫБОРА МАРШРУТА ============
        function onRouteChange() {
            const routeSelect = document.getElementById('routeSelect');
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = !routeSelect.value;
        }

        // ============ ЗАПУСК ТАБЛО ============
        async function startDisplay() {
            const routeSelect = document.getElementById('routeSelect');
            selectedRouteId = routeSelect.value;
            
            if (!selectedRouteId) return;
            
            // Получаем данные маршрута
            const selectedOption = routeSelect.options[routeSelect.selectedIndex];
            selectedRouteData = {
                id: selectedRouteId,
                route_number: selectedOption.dataset.routeNumber,
                name: selectedOption.dataset.routeName,
                end_point: selectedOption.dataset.endPoint
            };
            
            // Загружаем остановки
            try {
                const response = await fetch(`/api/stops?route_id=${selectedRouteId}`);
                stopsData = await response.json();
                totalStops = stopsData.length;
                
                if (totalStops === 0) {
                    alert('У этого маршрута нет остановок. Добавьте остановки в админ-панели.');
                    return;
                }
                
                // Получаем текущее состояние маршрута
                const stateResponse = await fetch(`/api/current-stop?route_id=${selectedRouteId}`);
                const stateData = await stateResponse.json();
                currentStopOrder = stateData.current_order || 1;
                
                // Переключаем экраны
                document.getElementById('selectionScreen').classList.add('hidden');
                document.getElementById('displayScreen').classList.remove('hidden');
                
                // Заполняем информацию
                updateDisplayInfo();
                
                // Создаем индикатор остановок
                createStopIndicator();
                
                // Запускаем бегущую строку
                startTicker();
                
                // Запускаем автоматическое переключение
                startAutoAdvance();
                
                // Обновляем состояние на сервере
                updateServerState();
                
            } catch (error) {
                console.error('Ошибка запуска табло:', error);
                alert('Ошибка загрузки данных маршрута');
            }
        }

        // ============ ОБНОВЛЕНИЕ ИНФОРМАЦИИ НА ТАБЛО ============
        function updateDisplayInfo() {
            // Номер и название маршрута
            document.getElementById('dispRouteNumber').textContent = selectedRouteData.route_number;
            document.getElementById('dispRouteName').textContent = selectedRouteData.name;
            document.getElementById('dispBigNumber').textContent = selectedRouteData.route_number;
            
            // Конечная остановка
            document.getElementById('finalStopDisplay').textContent = selectedRouteData.end_point;
            
            // Текущая и следующая остановки
            updateStopDisplay();
        }

        function updateStopDisplay() {
            const currentStop = stopsData[currentStopOrder - 1];
            const nextStop = stopsData[currentStopOrder]; // следующая после текущей
            
            // Обновляем текущую остановку
            const currentStopEl = document.getElementById('currentStopDisplay');
            if (currentStop) {
                currentStopEl.textContent = currentStop.name;
            }
            
            // Обновляем следующую остановку
            const nextStopEl = document.getElementById('nextStopDisplay');
            if (nextStop) {
                nextStopEl.textContent = nextStop.name;
            } else if (currentStopOrder >= totalStops) {
                nextStopEl.textContent = 'КОНЕЧНАЯ';
            }
            
            // Обновляем индикатор
            updateStopIndicator();
        }

        // ============ ИНДИКАТОР ОСТАНОВОК ============
        function createStopIndicator() {
            const container = document.getElementById('stopIndicator');
            container.innerHTML = '';
            
            stopsData.forEach((stop, index) => {
                const dot = document.createElement('div');
                dot.className = 'stop-dot';
                dot.title = stop.name;
                dot.dataset.index = index + 1;
                container.appendChild(dot);
            });
            
            updateStopIndicator();
        }

        function updateStopIndicator() {
            const dots = document.querySelectorAll('.stop-dot');
            dots.forEach(dot => {
                const index = parseInt(dot.dataset.index);
                dot.className = 'stop-dot';
                
                if (index < currentStopOrder) {
                    dot.classList.add('passed');
                } else if (index === currentStopOrder) {
                    dot.classList.add('current');
                } else {
                    dot.classList.add('upcoming');
                }
            });
        }

        // ============ БЕГУЩАЯ СТРОКА ============
        function startTicker() {
            updateTickerText();
            tickerInterval = setInterval(() => {
                tickerPhase = tickerPhase === 'route' ? 'announcement' : 'route';
                updateTickerText();
            }, 10000);
        }

        function updateTickerText() {
            const tickerEl = document.getElementById('tickerText');
            const currentStop = stopsData[currentStopOrder - 1];
            const nextStop = stopsData[currentStopOrder];
            
            // Сбрасываем анимацию
            tickerEl.style.animation = 'none';
            tickerEl.offsetHeight; // trigger reflow
            tickerEl.style.animation = '';
            
            if (tickerPhase === 'announcement' && nextStop) {
                // Фаза объявления
                tickerEl.textContent = `🔊 Следующая остановка — ${nextStop.name}`;
                tickerEl.className = 'ticker-content announcement';
                isAnnouncing = true;
                
                // Через 3 секунды возвращаемся к обычной строке
                setTimeout(() => {
                    if (tickerPhase === 'announcement') {
                        tickerPhase = 'route';
                        updateTickerText();
                    }
                }, 3000);
            } else {
                // Обычная информационная строка
                tickerEl.className = 'ticker-content';
                isAnnouncing = false;
                
                if (currentStop && nextStop) {
                    tickerEl.textContent = `🚌 Маршрут №${selectedRouteData.route_number} | Остановка "${currentStop.name}" | Следующая: "${nextStop.name}" | Конечная: "${selectedRouteData.end_point}"`;
                } else if (currentStop && currentStopOrder >= totalStops) {
                    tickerEl.textContent = `🚌 Маршрут №${selectedRouteData.route_number} | 🏁 Конечная остановка: "${currentStop.name}" | Спасибо за поездку!`;
                }
            }
        }

        // ============ АВТОМАТИЧЕСКОЕ ПЕРЕКЛЮЧЕНИЕ ============
        function startAutoAdvance() {
            if (autoAdvanceInterval) clearInterval(autoAdvanceInterval);
            
            autoAdvanceInterval = setInterval(() => {
                moveToNextStop();
            }, 8000); // Каждые 8 секунд переключаем
        }

        async function moveToNextStop() {
            if (currentStopOrder >= totalStops) {
                // Достигли конечной, останавливаем авто-переключение
                clearInterval(autoAdvanceInterval);
                autoAdvanceInterval = null;
                
                // Показываем сообщение
                const tickerEl = document.getElementById('tickerText');
                tickerEl.style.animation = 'none';
                tickerEl.offsetHeight;
                tickerEl.style.animation = '';
                tickerEl.textContent = '🏁 Мы прибыли на конечную остановку. Спасибо за поездку!';
                tickerEl.className = 'ticker-content';
                
                return;
            }
            
            // Переключаем на следующую
            currentStopOrder++;
            updateStopDisplay();
            updateServerState();
            
            // Показываем анонс следующей остановки
            tickerPhase = 'announcement';
            updateTickerText();
        }

        // ============ ОБНОВЛЕНИЕ СОСТОЯНИЯ НА СЕРВЕРЕ ============
        async function updateServerState() {
            try {
                await fetch('/api/current-stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        route_id: parseInt(selectedRouteId),
                        direction: 'next',
                        force_order: currentStopOrder
                    })
                });
            } catch (error) {
                console.error('Ошибка обновления состояния:', error);
            }
        }

        // ============ ВОЗВРАТ К ВЫБОРУ ============
        function goBack() {
            // Останавливаем все интервалы
            if (autoAdvanceInterval) clearInterval(autoAdvanceInterval);
            if (tickerInterval) clearInterval(tickerInterval);
            
            // Сбрасываем переменные
            selectedRouteId = null;
            selectedRouteData = null;
            stopsData = [];
            currentStopOrder = 1;
            totalStops = 0;
            
            // Переключаем экраны
            document.getElementById('displayScreen').classList.add('hidden');
            document.getElementById('selectionScreen').classList.remove('hidden');
            
            // Сбрасываем селекторы
            document.getElementById('routeSelect').value = '';
            document.getElementById('startBtn').disabled = true;
        }

        // ============ УПРАВЛЕНИЕ С КЛАВИАТУРЫ ============
        document.addEventListener('keydown', (e) => {
            const displayVisible = !document.getElementById('displayScreen').classList.contains('hidden');
            if (!displayVisible) return;
            
            switch(e.key) {
                case 'ArrowRight':
                case ' ':
                    e.preventDefault();
                    moveToNextStop();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (currentStopOrder > 1) {
                        currentStopOrder--;
                        updateStopDisplay();
                        updateServerState();
                    }
                    break;
                case 'Escape':
                    goBack();
                    break;
            }
        });

        // ============ СВАЙПЫ ДЛЯ ТАЧ-ЭКРАНОВ ============
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', (e) => {
            const displayVisible = !document.getElementById('displayScreen').classList.contains('hidden');
            if (!displayVisible) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    // Свайп влево - следующая
                    moveToNextStop();
                } else {
                    // Свайп вправо - предыдущая
                    if (currentStopOrder > 1) {
                        currentStopOrder--;
                        updateStopDisplay();
                        updateServerState();
                    }
                }
            }
        });
    </script>
</body>
</html>
